services:
  db:
    image: postgres:18
    container_name: erp_db
    restart: always
    env_file:
      - .env.prod
    environment:
      - PGDATA=/var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    networks:
      - erp_network

  backend:
    build: .
    container_name: erp_backend
    restart: always
    depends_on:
      - db
    ports:
      - "8000:8000"
    env_file:
      - .env.prod
    volumes:
      - .:/app
    networks:
      - erp_network

volumes:
  db_data:

networks:
  erp_network:
    driver: bridge