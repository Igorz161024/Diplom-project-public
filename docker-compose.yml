version: "3.9"

services:
  db:
    image: postgres:15
    container_name: erp_db
    restart: always
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: ****
      POSTGRES_DB: erp_diplom
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    networks:
      - erp_network

  backend:
    build: .
    container_name: erp_backend
    restart: always
    depends_on:
      - db
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+psycopg2://user:****@db:5432/erp_diplom
    volumes:
      - .:/app
    networks:
      - erp_network

volumes:
  db_data:

networks:
  erp_network:
    driver: bridge